name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Rust and Node checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install Node
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Run CI
        run: bash scripts/ci.sh
